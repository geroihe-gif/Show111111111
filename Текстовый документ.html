<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>MEDET EVENT SHOW</title>
  <style>
    body {
      margin: 0; padding: 0; height: 100vh; background: #000; color: #fff;
      font-family: 'Impact', 'Arial Black', sans-serif;
      display: flex; flex-direction: column; align-items: center; justify-content: center;
      text-align: center; overflow: hidden;
    }
    h1 { font-size: 3.5rem; text-shadow: 0 0 40px #ff00ff, 0 0 80px #00ffff; margin-bottom: 20px; }
    p { font-size: 1.3rem; max-width: 80%; margin: 15px auto; }
    button {
      margin-top: 30px; padding: 18px 60px; font-size: 1.9rem;
      background: transparent; color: #fff; border: 5px solid #fff;
      cursor: pointer; text-transform: uppercase;
    }
    #status { margin-top: 30px; font-size: 1.4rem; min-height: 50px; }
  </style>
</head>
<body>

  <h1>MEDET EVENT SHOW</h1>
  <p>Нажми кнопку ниже и разреши доступ к камере.<br>Вспышка будет работать только на Android в Chrome.</p>
  <button id="startBtn">РАЗРЕШИТЬ И ЗАПУСТИТЬ ШОУ</button>
  <div id="status"></div>

  <script>
    let stream = null;
    let track = null;
    let strobeInterval = null;

    const statusEl = document.getElementById('status');
    const startBtn = document.getElementById('startBtn');

    async function startStrobe() {
      if (!track) return;

      statusEl.textContent = "Шоу запущено 🔥 Стробоскоп работает";

      if (strobeInterval) clearInterval(strobeInterval);

      let torchState = false;
      strobeInterval = setInterval(async () => {
        try {
          torchState = !torchState;
          await track.applyConstraints({
            advanced: [{ torch: torchState }]
          });
        } catch (err) {
          console.error("Torch error:", err);
          statusEl.textContent = "Ошибка управления вспышкой";
        }
      }, 200); // 200 мс — относительно безопасная скорость
    }

    async function enableTorch() {
      try {
        statusEl.textContent = "Запрашиваем доступ к камере...";

        // Запрашиваем заднюю камеру
        stream = await navigator.mediaDevices.getUserMedia({
          video: { 
            facingMode: { exact: "environment" },  // обязательно задняя камера
            width: { ideal: 640 },
            height: { ideal: 480 }
          }
        });

        track = stream.getVideoTracks()[0];

        // Проверяем поддержку torch
        const capabilities = track.getCapabilities();
        if (!capabilities.torch) {
          statusEl.textContent = "Вспышка не поддерживается на этом устройстве :(";
          return;
        }

        startBtn.style.display = "none";
        await startStrobe();

      } catch (err) {
        console.error(err);
        if (err.name === "NotAllowedError") {
          statusEl.textContent = "Доступ к камере запрещён. Обнови страницу и разреши.";
        } else if (err.name === "NotFoundError") {
          statusEl.textContent = "Задняя камера не найдена";
        } else {
          statusEl.textContent = "Ошибка: " + err.message;
        }
      }
    }

    startBtn.addEventListener('click', enableTorch);

    // Проверка поддержки
    if (!navigator.mediaDevices || !navigator.mediaDevices.getUserMedia) {
      statusEl.textContent = "Твой браузер не поддерживает эту функцию";
    }
  </script>
</body>
</html>
